name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Setup Chocolatey for GoReleaser
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-devel
          mkdir -p /tmp/choco && cd /tmp/choco
          wget "https://github.com/chocolatey/choco/releases/download/2.3.0/chocolatey.v2.3.0.tar.gz" -O choco.tar.gz
          tar -xzf choco.tar.gz
          echo -e '#!/bin/bash\nmono /tmp/choco/choco.exe "$@"' | sudo tee /usr/local/bin/choco
          sudo chmod +x /usr/local/bin/choco
          choco -v

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Winget Manifests to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          zip -r kpv-winget.zip winget/manifests
          gh release upload ${{ github.ref_name }} kpv-winget.zip
